{% extends 'base.html' %}

{% block content %}

<h1>📊 Dashboard</h1>

<!-- FORM -->
<div class="card">
    <h2>Registrar Entrega</h2>
    <form action="/add" method="POST">
        <input type="number" step="0.01" name="valor" placeholder="Valor do Pedido" required>

        <select name="bairro_id" required>
            <option value="">Selecione o bairro</option>
            {% for b in bairros %}
                <option value="{{ b['id'] }}">
                    {{ b['nome'] }} (R$ {{ b['taxa'] }})
                </option>
            {% endfor %}
        </select>

        <input type="date" name="data" required>
        <input type="time" name="hora" required>

        <button type="submit">Adicionar</button>
    </form>
</div>

<div class="grid">

    <div class="card">
        <h2>📊 Entregas por Horário</h2>
        <canvas id="graficoHorarios"></canvas>
    </div>

    <div class="card">
        <h2>🏆 Entregas por Bairro</h2>
        <canvas id="graficoBairros"></canvas>
    </div>

</div>

<!-- LISTA -->
<div class="card">
    <h2>📦 Entregas de Hoje</h2>
    <ul>
        {% for d in deliveries %}
            <li>
                R$ {{ d['valor_produto'] }} - {{ d['bairro'] }} - {{ d['hora'] }}
            </li>
        {% endfor %}
    </ul>
</div>

<!-- DADOS VINDOS DO FLASK -->
<script>
    var horasLabels = {{ horas_labels | tojson | safe }};
    var horasValores = {{ horas_valores | tojson | safe }};
    var bairrosLabels = {{ bairros_labels | tojson | safe }};
    var bairrosValores = {{ bairros_valores | tojson | safe }};
</script>

<!-- SEU JS -->
<script src="/static/js/dashboard.js"></script>

{% endblock %}
