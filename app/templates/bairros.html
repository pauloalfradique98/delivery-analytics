{% extends 'base.html' %}

{% block content %}

<h1>📍 Gerenciar Bairros</h1>

<div class="card">
    <h2>Adicionar Bairro</h2>

    <form method="POST">
        <input type="text" name="nome" placeholder="Nome do bairro" required>
        <input type="number" step="0.01" name="taxa" placeholder="Taxa de entrega" required>

        <button type="submit">Adicionar</button>
    </form>
</div>

<div class="card">
    <h2>Lista de Bairros</h2>

    {% if bairros %}
    <table class="table-modern">
        <tr>
            <th>Nome</th>
            <th>Taxa</th>
            <th>Ações</th>
        </tr>

        {% for b in bairros %}
        <tr>
            <td>{{ b['nome'] }}</td>
            <td>R$ {{ "%.2f"|format(b['taxa']) }}</td>
            <td class="actions-cell" style="justify-content: center;">
                <a href="{{ url_for('bairros.edit_bairro', id=b['id']) }}" class="btn-action btn-edit">
                    ✏️ Editar
                </a>

                <form action="{{ url_for('bairros.delete_bairro_route', id=b['id']) }}" method="POST" style="margin:0;">
                    <button type="submit" class="btn-action btn-delete" onclick="return confirm('Excluir bairro? Isso pode afetar entregas vinculadas.')">
                        🗑️ Excluir
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <p>Nenhum bairro cadastrado.</p>
    {% endif %}

</div>

{% endblock %}
