{% extends 'base.html' %}

{% block content %}

<h1>✏️ Editar Bairro</h1>

<div class="card">
    <form method="POST">

        <label>Nome:</label>
        <input type="text" name="nome" value="{{ bairro['nome'] }}" required>

        <label>Taxa:</label>
        <input type="number" step="0.01" name="taxa" value="{{ bairro['taxa'] }}" required>

        <button type="submit">Salvar</button>

    </form>
</div>

{% endblock %}
